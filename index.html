<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maritime OSINT v1</title>
  <meta name="theme-color" content="#0b1f3a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <header>
    <h1>Maritime OSINT v1</h1>
    <p>Search vessels and view latest maritime MDA news.</p>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Vessel Search</h2>
      <input id="search" placeholder="Search by IMO, MMSI, or name..." />
      <ul id="vesselList"></ul>
    </section>

    <section class="panel">
      <h2>Map</h2>
      <div id="map"></div>
    </section>

    <section class="panel">
      <h2>Alerts</h2>
      <ul id="alerts"></ul>
    </section>

    <section class="panel">
      <h2>MDA News</h2>
      <ul id="newsList"></ul>
    </section>
  </main>

  <footer><small>Demo app shell connected to local backend API.</small></footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/app.v2.js"></script>
</body>
</html>
